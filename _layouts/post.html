---
layout: default
---

<article class="post-layout">
  <div class="container">
    <div class="post-header">
      <span class="eyebrow">{{ page.category | default: "Artigo" }}</span>
      <h1>{{ page.title }}</h1>
      <p class="post-meta">
        {{ page.date | date: "%d/%m/%Y" }}
        {% if page.author %} • {{ page.author }}{% endif %}
      </p>
    </div>

    {% if page.image %}
      <img class="post-cover" src="{{ page.image | relative_url }}" alt="{{ page.title }}">
    {% endif %}

    <div class="post-content">
      {{ content }}
    </div>
  </div>
</article>
