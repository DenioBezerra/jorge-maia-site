---
layout: default
---

<section class="page-header">
  <div class="container">
    {% if page.eyebrow %}
      <span class="eyebrow">{{ page.eyebrow }}</span>
    {% endif %}

    <h1>{{ page.title }}</h1>

    {% if page.description %}
      <p>{{ page.description }}</p>
    {% endif %}
  </div>
</section>

<section class="page-content">
  <div class="container">
    {{ content }}
  </div>
</section>
